version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: chatbot_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: chatbot_algerie
    restart: unless-stopped

  api:
    build: .
    container_name: chatbot_api
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

volumes:
  mongo_data:
