services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_pfe
    ports:
      - "27018:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - spark_network
    restart: always

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: spark_master_pfe
    environment:
      - SPARK_MODE=master
      - TRANSFORMERS_CACHE=/opt/huggingface
      - HF_HOME=/opt/huggingface
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - spark-data:/data
      - ./data/results:/opt/data
      - ./pymongo_libs:/opt/pymongo_libs
      - ./dictionnaires:/opt/dictionnaires
      - /home/mouna/.cache/huggingface:/opt/huggingface  # ✅ modèle MarBERT accessible par spark
    networks:
      - spark_network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    restart: always

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: worker_1_pfe
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - PYTHONPATH=/opt/pymongo_libs
      - TRANSFORMERS_CACHE=/opt/huggingface
      - HF_HOME=/opt/huggingface
    volumes:
      - spark-data:/data
      - ./data/results:/opt/data
      - ./pymongo_libs:/opt/pymongo_libs
      - ./dictionnaires:/opt/dictionnaires
      - /home/mouna/.cache/huggingface:/opt/huggingface  # ✅ modèle MarBERT accessible par spark
    networks:
      - spark_network
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    restart: always

  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: worker_2_pfe
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - PYTHONPATH=/opt/pymongo_libs
      - TRANSFORMERS_CACHE=/opt/huggingface
      - HF_HOME=/opt/huggingface
    volumes:
      - spark-data:/data
      - ./data/results:/opt/data
      - ./pymongo_libs:/opt/pymongo_libs
      - ./dictionnaires:/opt/dictionnaires
      - /home/mouna/.cache/huggingface:/opt/huggingface  # ✅ modèle MarBERT accessible par spark
    networks:
      - spark_network
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    restart: always

  spark-worker-3:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: worker_3_pfe
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - PYTHONPATH=/opt/pymongo_libs
      - TRANSFORMERS_CACHE=/opt/huggingface
      - HF_HOME=/opt/huggingface
    volumes:
      - spark-data:/data
      - ./data/results:/opt/data
      - ./pymongo_libs:/opt/pymongo_libs
      - ./dictionnaires:/opt/dictionnaires
      - /home/mouna/.cache/huggingface:/opt/huggingface  # ✅ modèle MarBERT accessible par spark
    networks:
      - spark_network
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    restart: always

volumes:
  spark-data:
  mongodb-data:

networks:
  spark_network:
    driver: bridge